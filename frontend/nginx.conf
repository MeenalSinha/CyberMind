server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options           "DENY"                            always;
    add_header X-Content-Type-Options    "nosniff"                         always;
    add_header X-XSS-Protection          "1; mode=block"                   always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    # HSTS: browsers enforce HTTPS for 1 year (enable once TLS is confirmed)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # CSP: adjust src as needed for your CDNs
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; \
         style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; \
         font-src 'self' https://fonts.gstatic.com; \
         img-src 'self' data: https://images.unsplash.com; \
         connect-src 'self' http://backend:8000 https:; \
         frame-ancestors 'none';"
        always;

    # Remove server version from responses
    server_tokens off;

    # ── SPA routing ─────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy to backend ─────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # ── Health passthrough ───────────────────────────────────────────────────
    location /health {
        proxy_pass http://backend:8000/health;
    }

    # ── Static asset caching ─────────────────────────────────────────────────
    location ~* \.(js|css|woff2|woff|ttf|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(png|jpg|jpeg|gif|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Compression ──────────────────────────────────────────────────────────
    gzip            on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied    any;
    gzip_types      text/plain text/css application/javascript application/json
                    image/svg+xml application/font-woff2;
}
