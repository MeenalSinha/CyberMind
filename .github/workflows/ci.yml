name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Backend Tests ─────────────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        env:
          SECRET_KEY: ci-test-key-not-for-production
          ENVIRONMENT: development
          DATABASE_URL: sqlite+aiosqlite:///./test.db
        run: pytest -v --tb=short

  # ── 2. Frontend Build ────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          # No cache: npm — requires package-lock.json which we don't commit

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build production bundle
        working-directory: frontend
        env:
          VITE_API_URL: ""
        run: npm run build

  # ── 3. Docker Build Check ────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t cybermind-backend ./backend

      - name: Build frontend image
        run: docker build -t cybermind-frontend ./frontend
